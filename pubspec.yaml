name: project_kevin
description: "Kevin - AI assistant for Android and Windows."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Background service
  flutter_foreground_task: ^9.0.1

  # Permissions
  permission_handler: ^11.4.0

  # Audio playback
  just_audio: ^0.10.4

  # Audio recording
  record: ^5.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Wake word detection
  porcupine_flutter: ^3.0.4

  # HTTP clients
  http: ^1.4.0
  dio: ^5.8.0+1

  # Persistence
  shared_preferences: ^2.5.3

  # Connectivity
  connectivity_plus: ^6.1.4

  # UUID generation
  uuid: ^4.5.1

  # File picker for attachments
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  glados: ^1.1.7

flutter:
  uses-material-design: true

  assets:
    - assets/
